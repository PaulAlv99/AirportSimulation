services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: airport_simulation
      POSTGRES_USER: airport
      POSTGRES_PASSWORD: airport
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airport -d airport_simulation"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - airport-simulation-postgres:/var/lib/postgresql/data

  airport-simulation:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/airport_simulation
      SPRING_DATASOURCE_USERNAME: airport
      SPRING_DATASOURCE_PASSWORD: airport
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "4"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "10000"
      SPRING_DEBUG: "false"
      SPRING_MAIN_BANNER_MODE: "off"
      DEBUG: "false"
      AIRPORT_SIMULATION_DATA_DIR: /app/data
      AIRPORT_SIMULATION_DEFAULT_AIRPORT_CODE: LIS
      AIRPORT_SIMULATION_AUTO_START: "true"
      AIRPORT_SIMULATION_DEMO_FLIGHT_COUNT: "12"
      AIRPORT_SIMULATION_FLIGHT_SEED_LIMIT: "24"
      AIRPORT_SIMULATION_TRAFFIC_PROFILE: BUSY
      AIRPORT_SIMULATION_TARGET_DAILY_FLIGHTS: "220"
      AIRPORT_SIMULATION_PASSENGER_LOAD_FACTOR: "0.82"
      AIRPORT_SIMULATION_BAG_RATE: "0.72"
      AIRPORT_SIMULATION_USE_OPENFLIGHTS: "true"
      AIRPORT_SIMULATION_RANDOM_SEED: "0"
      AIRPORT_SIMULATION_DELAY_PROBABILITY: "0.08"
      AIRPORT_SIMULATION_BAGGAGE_EXCEPTION_PROBABILITY: "0.012"
      AIRPORT_SIMULATION_PASSENGER_NO_SHOW_PROBABILITY: "0.035"
      AIRPORT_SIMULATION_GROUND_JITTER_MINUTES: "12"
      SERVER_SERVLET_CONTEXT_PATH: /projects/airport-simulation
    expose:
      - "8080"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./saves:/app/saves
    networks:
      default:
      proxy:
        aliases:
          - airport-simulation

volumes:
  airport-simulation-postgres:

networks:
  proxy:
    external: true
