server:
  port: 8080
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/airport-simulation}

debug: ${SPRING_DEBUG:false}

spring:
  application:
    name: airport-simulation
  main:
    banner-mode: ${SPRING_MAIN_BANNER_MODE:off}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/airport_simulation}
    username: ${SPRING_DATASOURCE_USERNAME:airport}
    password: ${SPRING_DATASOURCE_PASSWORD:airport}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:4}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
  flyway:
    enabled: true
  sql:
    init:
      mode: never
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework.boot: INFO
    org.springframework.boot.autoconfigure: INFO
    org.springframework.boot.web.servlet: INFO
    org.springframework.boot.web.servlet.ServletContextInitializerBeans: INFO
    org.springframework.context: INFO
    org.springframework.jdbc.core: INFO
    org.springframework.web: INFO

airport-simulation:
  data-dir: ${AIRPORT_SIMULATION_DATA_DIR:data}
  default-airport-code: ${AIRPORT_SIMULATION_DEFAULT_AIRPORT_CODE:LIS}
  auto-start: ${AIRPORT_SIMULATION_AUTO_START:true}
  tick-interval: ${AIRPORT_SIMULATION_TICK_INTERVAL:1s}
  demo-flight-count: ${AIRPORT_SIMULATION_DEMO_FLIGHT_COUNT:12}
  flight-seed-limit: ${AIRPORT_SIMULATION_FLIGHT_SEED_LIMIT:24}
  traffic-profile: ${AIRPORT_SIMULATION_TRAFFIC_PROFILE:BUSY}
  target-daily-flights: ${AIRPORT_SIMULATION_TARGET_DAILY_FLIGHTS:220}
  passenger-load-factor: ${AIRPORT_SIMULATION_PASSENGER_LOAD_FACTOR:0.82}
  bag-rate: ${AIRPORT_SIMULATION_BAG_RATE:0.72}
  use-open-flights: ${AIRPORT_SIMULATION_USE_OPENFLIGHTS:true}
  random-seed: ${AIRPORT_SIMULATION_RANDOM_SEED:0}
  delay-probability: ${AIRPORT_SIMULATION_DELAY_PROBABILITY:0.08}
  baggage-exception-probability: ${AIRPORT_SIMULATION_BAGGAGE_EXCEPTION_PROBABILITY:0.012}
  passenger-no-show-probability: ${AIRPORT_SIMULATION_PASSENGER_NO_SHOW_PROBABILITY:0.035}
  ground-jitter-minutes: ${AIRPORT_SIMULATION_GROUND_JITTER_MINUTES:12}
